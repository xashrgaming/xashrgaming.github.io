<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Xashr Gaming Lab</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

html, body {
    width: 100%;
    height: 100%;
    overflow: hidden;
}

body {
    background: radial-gradient(circle at center, #1a1a2e, #0f0f17);
    color: white;
    font-family: Arial, sans-serif;
    touch-action: none;
}

#ui {
    position: absolute;
    top: 20px;
    left: 20px;
    z-index: 10;
    pointer-events: none;
}

h1 {
    color: #00ffff;
    text-shadow: 0 0 10px cyan;
    font-size: clamp(1.5rem, 4vw, 3rem);
}

p {
    opacity: 0.8;
    margin-top: 8px;
}

canvas {
    display: block;
    width: 100vw;
    height: 100vh;
}
</style>
</head>
<body>

<div id="ui">
    <h1>Hello World - Xashr Gaming</h1>
    <p>Move, touch, drag, or tap the screen.</p>
</div>

<canvas id="game"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}

resize();
window.addEventListener("resize", resize);

const pointer = {
    x: window.innerWidth / 2,
    y: window.innerHeight / 2
};

class Particle {
    constructor(angle) {
        this.angle = angle;
        this.radius = 40 + Math.random() * 160;
        this.size = 2 + Math.random() * 5;
        this.speed = 0.01 + Math.random() * 0.03;
        this.color = `hsl(${Math.random() * 360},100%,60%)`;

        this.free = false;
        this.x = 0;
        this.y = 0;
        this.vx = 0;
        this.vy = 0;
    }

    update() {
        if (!this.free) {
            this.angle += this.speed;
        } else {
            this.x += this.vx;
            this.y += this.vy;

            this.vx *= 0.995;
            this.vy *= 0.995;
        }
    }

    getPosition() {
        if (!this.free) {
            return {
                x: pointer.x + Math.cos(this.angle) * this.radius,
                y: pointer.y + Math.sin(this.angle) * this.radius
            };
        }

        return {
            x: this.x,
            y: this.y
        };
    }

    draw() {
        const pos = this.getPosition();

        ctx.beginPath();
        ctx.arc(pos.x, pos.y, this.size, 0, Math.PI * 2);
        ctx.fillStyle = this.color;
        ctx.fill();
    }

    explode() {
        const pos = this.getPosition();

        this.x = pos.x;
        this.y = pos.y;
        this.free = true;

        const power = 3 + Math.random() * 10;

        this.vx = (Math.random() - 0.5) * power;
        this.vy = (Math.random() - 0.5) * power;
    }
}

const particles = [];

function createSwarm() {
    particles.length = 0;

    for (let i = 0; i < 250; i++) {
        particles.push(
            new Particle(Math.random() * Math.PI * 2)
        );
    }
}

createSwarm();

function explodeParticles() {
    particles.forEach(p => p.explode());

    setTimeout(() => {
        createSwarm();
    }, 1500);
}

window.addEventListener("pointermove", e => {
    pointer.x = e.clientX;
    pointer.y = e.clientY;
});

window.addEventListener("pointerdown", e => {
    pointer.x = e.clientX;
    pointer.y = e.clientY;

    explodeParticles();
});

function animate() {
    ctx.fillStyle = "rgba(0,0,0,0.12)";
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    particles.forEach(p => {
        p.update();
        p.draw();
    });

    requestAnimationFrame(animate);
}

animate();
</script>

</body>
</html>
