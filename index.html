<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Xashr Gaming Lab</title>

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    body {
        background: radial-gradient(circle at center, #1a1a2e, #0f0f17);
        overflow: hidden;
        color: white;
        font-family: Arial, sans-serif;
    }

    #ui {
        position: absolute;
        top: 20px;
        left: 20px;
        z-index: 10;
    }

    h1 {
        color: #00ffff;
        text-shadow: 0 0 10px cyan;
    }

    p {
        opacity: 0.8;
    }

    canvas {
        display: block;
    }
</style>
</head>
<body>

<div id="ui">
    <h1>Hello World - Xashr Gaming</h1>
    <p>Move your mouse. Click to create chaos.</p>
</div>

<canvas id="game"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}
resize();
window.addEventListener("resize", resize);

const mouse = {
    x: window.innerWidth / 2,
    y: window.innerHeight / 2
};

window.addEventListener("mousemove", e => {
    mouse.x = e.clientX;
    mouse.y = e.clientY;
});

class Particle {
    constructor(angle) {
        this.angle = angle;
        this.radius = 50 + Math.random() * 150;
        this.size = 2 + Math.random() * 5;
        this.speed = 0.01 + Math.random() * 0.03;
        this.color = `hsl(${Math.random() * 360}, 100%, 60%)`;
        this.vx = 0;
        this.vy = 0;
        this.free = false;
    }

    update() {
        if (!this.free) {
            this.angle += this.speed;
        }
    }

    draw() {
        let x, y;

        if (!this.free) {
            x = mouse.x + Math.cos(this.angle) * this.radius;
            y = mouse.y + Math.sin(this.angle) * this.radius;
        } else {
            this.x += this.vx;
            this.y += this.vy;
            x = this.x;
            y = this.y;
        }

        ctx.beginPath();
        ctx.arc(x, y, this.size, 0, Math.PI * 2);
        ctx.fillStyle = this.color;
        ctx.fill();
    }

    explode() {
        const x = mouse.x + Math.cos(this.angle) * this.radius;
        const y = mouse.y + Math.sin(this.angle) * this.radius;

        this.x = x;
        this.y = y;
        this.free = true;

        const power = 2 + Math.random() * 8;
        this.vx = (Math.random() - 0.5) * power;
        this.vy = (Math.random() - 0.5) * power;
    }
}

const particles = [];

for (let i = 0; i < 250; i++) {
    particles.push(new Particle(Math.random() * Math.PI * 2));
}

window.addEventListener("click", () => {
    particles.forEach(p => p.explode());

    setTimeout(() => {
        particles.length = 0;

        for (let i = 0; i < 250; i++) {
            particles.push(
                new Particle(Math.random() * Math.PI * 2)
            );
        }
    }, 2000);
});

function animate() {
    ctx.fillStyle = "rgba(0,0,0,0.12)";
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    particles.forEach(p => {
        p.update();
        p.draw();
    });

    requestAnimationFrame(animate);
}

animate();
</script>

</body>
</html>
