<style>
    body {
        margin: 0;
        font-family: Arial;
        color: white;
        background: #000;
    }

    /* Grid background */
    body::before {
        content: "";
        position: fixed;
        inset: 0;
        background-image:
            linear-gradient(#222 1px, transparent 1px),
            linear-gradient(90deg, #222 1px, transparent 1px);
        background-size: 40px 40px;
        animation: moveGrid 12s linear infinite;
        z-index: -1;
        pointer-events: none;
    }

    @keyframes moveGrid {
        0% { background-position: 0 0; }
        100% { background-position: 200px 200px; }
    }

    /* Back button */
    .backBtn {
        position: fixed;
        top: 15px;
        left: 15px;
        padding: 10px 20px;
        background: #00aaff;
        border: none;
        border-radius: 10px;
        color: black;
        cursor: pointer;
        z-index: 5;
        font-size: 15px;
    }

    .wrapper {
        position: relative;
        z-index: 2;
        max-width: 1100px;
        margin: auto;
        padding: 20px;
        display: flex;
        gap: 20px;
    }
    </style>
