<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Account | xashr.lol</title>

    <style>
        html, body {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden;
            background: #000;
            font-family: Arial, sans-serif;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        body::before {
            content: "";
            position: fixed;
            inset: 0;
            background-image:
                linear-gradient(#222 1px, transparent 1px),
                linear-gradient(90deg, #222 1px, transparent 1px);
            background-size: 40px 40px;
            animation: moveGrid 12s linear infinite;
            z-index: 1;
            pointer-events: none;
        }

        @media (prefers-reduced-motion: no-preference) {
            @keyframes moveGrid {
                0% { background-position: 0 0; }
                100% { background-position: 200px 200px; }
            }
        }

        .form-container {
            position: relative;
            z-index: 2;
            width: 300px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            text-align: center;
        }

        input {
            padding: 10px;
            border-radius: 6px;
            border: none;
            outline: none;
            width: 100%;
        }

        .button {
            padding: 12px;
            background: #00aaff;
            border: none;
            border-radius: 8px;
            font-size: 18px;
            cursor: pointer;
        }

        .button:hover {
            background: #0088cc;
        }

        a {
            color: #00aaff;
            text-decoration: none;
            font-size: 15px;
        }

        a:hover {
            text-decoration: underline;
        }
    </style>
</head>

<body>

    <button style="
    position: fixed;
    top: 15px;
    left: 15px;
    padding: 10px 20px;
    background: #00aaff;
    border: none;
    border-radius: 10px;
    color: black;
    cursor: pointer;
    z-index: 5;
" onclick="history.back()">← Back</button>


    <div class="form-container">
        <h2>Create Account</h2>

        <input type="text" id="newUser" placeholder="Choose Username">
        <input type="password" id="newPass" placeholder="Choose Password">

        <button class="button" onclick="createAccount()">Create Account</button>

        <a href="signin.html">Back to Sign In</a>
    </div>

    <script>
        function createAccount() {
            const user = document.getElementById("newUser").value;
            const pass = document.getElementById("newPass").value;

            if (!user || !pass) {
                alert("Please fill in all fields.");
                return;
            }

            if (localStorage.getItem(user)) {
                alert("That username already exists.");
                return;
            }

            const account = {
                username: user,
                password: pass
            };

            localStorage.setItem(user, JSON.stringify(account));

            alert("Account created successfully!");
            window.location.href = "signin.html";
        }
    </script>

</body>
</html>
